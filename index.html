<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Teasdale Brown Gallery</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg1: #08111d;
      --bg2: #0d1a2b;
      --bg3: #13253b;
      --gold: #d8c18e;
      --gold-soft: rgba(216, 193, 142, 0.78);
      --text: #f4efe6;
      --muted: rgba(244, 239, 230, 0.72);
      --panel: rgba(255,255,255,0.04);
      --line: rgba(216, 193, 142, 0.14);
      --shadow: 0 24px 60px rgba(0,0,0,0.42);
    }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 0%, rgba(216,193,142,0.05), transparent 20%),
        radial-gradient(circle at 80% 0%, rgba(88,119,168,0.10), transparent 18%),
        linear-gradient(180deg, var(--bg3) 0%, var(--bg2) 34%, var(--bg1) 100%);
      min-height: 100vh;
    }

    .page {
      width: min(1380px, calc(100% - 24px));
      margin: 0 auto;
      padding: 18px 0 24px;
    }

    .layout {
      display: grid;
      grid-template-columns: 1.45fr 0.72fr;
      gap: 18px;
      align-items: stretch;
    }

    .viewer {
      position: relative;
      min-height: 72vh;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 28px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.015)),
        var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      overflow: hidden;
      padding: 18px;
      backdrop-filter: blur(8px);
    }

    .viewer::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at top left, rgba(216,193,142,0.06), transparent 18%),
        radial-gradient(circle at top right, rgba(88,119,168,0.08), transparent 20%);
    }

    .viewer img {
      max-width: 100%;
      max-height: 78vh;
      width: auto;
      height: auto;
      display: block;
      border-radius: 18px;
      object-fit: contain;
      box-shadow: 0 18px 40px rgba(0,0,0,0.30);
      transition: opacity 0.35s ease;
      position: relative;
      z-index: 1;
    }

    .side {
      border-radius: 28px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.015)),
        var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      text-align: center;
      min-height: 72vh;
    }

    .logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 18px;
    }

    .logo-wrap img {
      width: min(100%, 320px);
      height: auto;
      display: block;
      filter: drop-shadow(0 10px 18px rgba(0,0,0,0.22));
      opacity: 0.97;
    }

    .subtitle {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 18px;
      line-height: 1.6;
      color: var(--muted);
      max-width: 320px;
      margin-left: auto;
      margin-right: auto;
    }

    .future {
      margin-top: 26px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--gold-soft);
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 52px;
      height: 52px;
      border: 0;
      border-radius: 50%;
      background: rgba(0,0,0,0.34);
      color: #fff;
      font-size: 24px;
      cursor: pointer;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(6px);
      transition: background 0.18s ease, transform 0.18s ease, opacity 0.18s ease;
      opacity: 0.92;
    }

    .nav:hover {
      background: rgba(0,0,0,0.58);
      transform: translateY(-50%) scale(1.04);
    }

    .prev { left: 18px; }
    .next { right: 18px; }

    .download {
      position: absolute;
      top: 18px;
      right: 18px;
      z-index: 6;
      border: 1px solid rgba(216, 193, 142, 0.18);
      background: rgba(7, 12, 20, 0.55);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      line-height: 1;
      height: 42px;
      min-width: 112px;
      padding: 0 18px;
      border-radius: 999px;
      cursor: pointer;
      backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      text-align: center;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease, background 0.18s ease;
    }

    .viewer:hover .download,
    .download:hover,
    .download:focus-visible {
      opacity: 1;
      pointer-events: auto;
    }

    .download:hover {
      background: rgba(7, 12, 20, 0.78);
    }

    .status {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--muted);
      font-size: 16px;
      text-align: center;
      padding: 30px;
    }

    .albums {
      margin-top: 18px;
      text-align: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--muted);
      font-size: 14px;
      letter-spacing: 0.04em;
    }

    .albums span {
      display: inline-block;
      margin: 0 10px;
      padding: 8px 0;
      border-bottom: 1px solid transparent;
    }

    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .viewer,
      .side {
        min-height: auto;
      }

      .viewer {
        min-height: 56vh;
      }

      .side {
        padding: 22px 18px;
      }
    }

    @media (max-width: 700px) {
      .page {
        width: min(100% - 14px, 1380px);
        padding-top: 14px;
      }

      .logo-wrap img {
        width: min(100%, 260px);
      }

      .subtitle {
        font-size: 15px;
      }

      .viewer {
        padding: 12px;
        border-radius: 20px;
      }

      .side {
        border-radius: 20px;
      }

      .viewer img {
        max-height: 62vh;
        border-radius: 12px;
      }

      .nav {
        width: 44px;
        height: 44px;
        font-size: 20px;
      }

      .prev { left: 10px; }
      .next { right: 10px; }

      .download {
        top: 10px;
        right: 10px;
        height: 38px;
        min-width: 100px;
        font-size: 13px;
        padding: 0 14px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="layout">
      <section class="viewer" id="viewer">
        <div class="status" id="status">Loading gallery…</div>
        <button class="download" id="downloadBtn" type="button">Download</button>
        <button class="nav prev" id="prev" type="button" style="display:none;">←</button>
        <img id="photo" alt="" style="display:none;">
        <button class="nav next" id="next" type="button" style="display:none;">→</button>
      </section>

      <aside class="side">
        <div class="logo-wrap">
          <img src="logo.png" alt="Teasdale Brown Gallery">
        </div>
        <p class="subtitle">A changing selection of shared photos.</p>
        <div class="future">Albums coming later</div>
      </aside>
    </section>

    <div class="albums">
      <span>Future support: multiple albums</span>
    </div>
  </main>

  <script>
    const GITHUB_USER = "jamestb112233-stack";
    const REPO_NAME = "publicphotos";
    const IMAGES_PATH = "images";
    const AUTOPLAY_MS = 6000;

    const apiUrl = `https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/${IMAGES_PATH}`;

    const validExt = [".jpg", ".jpeg", ".png", ".webp", ".gif"];
    let images = [];
    let current = 0;
    let autoplayTimer = null;
    let paused = false;

    const viewerEl = document.getElementById("viewer");
    const statusEl = document.getElementById("status");
    const photoEl = document.getElementById("photo");
    const prevBtn = document.getElementById("prev");
    const nextBtn = document.getElementById("next");
    const downloadBtn = document.getElementById("downloadBtn");

    function isImageFile(name) {
      const lower = name.toLowerCase();
      return validExt.some(ext => lower.endsWith(ext));
    }

    function pauseAutoplay() {
      paused = true;
      if (autoplayTimer) {
        clearInterval(autoplayTimer);
        autoplayTimer = null;
      }
    }

    function startAutoplay() {
      if (autoplayTimer) clearInterval(autoplayTimer);
      if (paused || images.length <= 1) return;

      autoplayTimer = setInterval(() => {
        showImage(current + 1);
      }, AUTOPLAY_MS);
    }

    function resumeAutoplay() {
      paused = false;
      startAutoplay();
    }

    function updateDownloadButton(item) {
      downloadBtn.onclick = async (e) => {
        e.preventDefault();
        pauseAutoplay();

        try {
          downloadBtn.textContent = "Downloading…";
          const res = await fetch(item.download_url);
          const blob = await res.blob();
          const url = URL.createObjectURL(blob);

          const a = document.createElement("a");
          a.href = url;
          a.download = item.name;
          document.body.appendChild(a);
          a.click();
          a.remove();

          URL.revokeObjectURL(url);
        } catch (err) {
          console.error(err);
          alert("Download failed.");
        } finally {
          downloadBtn.textContent = "Download";
        }
      };
    }

    function showImage(index) {
      if (!images.length) return;

      current = (index + images.length) % images.length;
      const item = images[current];

      photoEl.style.opacity = "0";
      photoEl.onload = () => {
        photoEl.style.opacity = "1";
      };

      photoEl.src = item.download_url;
      photoEl.alt = item.name;

      updateDownloadButton(item);

      photoEl.style.display = "block";
      prevBtn.style.display = "flex";
      nextBtn.style.display = "flex";
      downloadBtn.style.display = "inline-flex";
      statusEl.style.display = "none";
    }

    prevBtn.addEventListener("click", () => {
      showImage(current - 1);
      startAutoplay();
    });

    nextBtn.addEventListener("click", () => {
      showImage(current + 1);
      startAutoplay();
    });

    viewerEl.addEventListener("mouseenter", pauseAutoplay);
    viewerEl.addEventListener("mouseleave", resumeAutoplay);

    downloadBtn.addEventListener("mouseenter", pauseAutoplay);
    downloadBtn.addEventListener("mouseleave", resumeAutoplay);

    let touchStartX = 0;
    let touchEndX = 0;

    photoEl.addEventListener("touchstart", e => {
      touchStartX = e.changedTouches[0].screenX;
      pauseAutoplay();
    }, { passive: true });

    photoEl.addEventListener("touchend", e => {
      touchEndX = e.changedTouches[0].screenX;
      if (touchEndX < touchStartX - 40) showImage(current + 1);
      if (touchEndX > touchStartX + 40) showImage(current - 1);
      resumeAutoplay();
    }, { passive: true });

    document.addEventListener("keydown", (e) => {
      if (!images.length) return;
      if (e.key === "ArrowLeft") {
        showImage(current - 1);
        startAutoplay();
      }
      if (e.key === "ArrowRight") {
        showImage(current + 1);
        startAutoplay();
      }
    });

    fetch(apiUrl)
      .then(res => {
        if (!res.ok) throw new Error("Could not read images folder.");
        return res.json();
      })
      .then(data => {
        images = data.filter(item => item.type === "file" && isImageFile(item.name));

        if (!images.length) {
          statusEl.textContent = "No images found in /images.";
          return;
        }

        images.sort((a, b) => a.name.localeCompare(b.name));
        showImage(0);
        startAutoplay();
      })
      .catch(err => {
        console.error(err);
        statusEl.textContent = "Could not load gallery.";
      });
  </script>
</body>
</html>
