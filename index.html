<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Teasdale Brown Gallery</title>

  <style>
    * { box-sizing: border-box; }

    :root {
      --bg1: #08111d;
      --bg2: #0d1a2b;
      --bg3: #13253b;
      --gold: #d8c18e;
      --text: #f4efe6;
      --muted: rgba(244, 239, 230, 0.72);
      --panel: rgba(255,255,255,0.04);
      --line: rgba(216, 193, 142, 0.14);
      --shadow: 0 24px 60px rgba(0,0,0,0.42);
    }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 0%, rgba(216,193,142,0.05), transparent 20%),
        radial-gradient(circle at 80% 0%, rgba(88,119,168,0.10), transparent 18%),
        linear-gradient(180deg, var(--bg3) 0%, var(--bg2) 34%, var(--bg1) 100%);
      min-height: 100vh;
    }

    /* NAV */
    .site-nav {
      width: min(1380px, calc(100% - 24px));
      margin: 14px auto 10px;
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .site-nav a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 0 16px;
      border-radius: 999px;
      text-decoration: none;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;

      color: #e6d79a;
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(230, 215, 154, 0.25);
    }

    .site-nav a.active {
      color: #fff;
      border-color: rgba(230, 215, 154, 0.6);
    }

    /* LAYOUT */
    .page {
      width: min(1380px, calc(100% - 24px));
      margin: 0 auto;
      padding: 10px 0 24px;
    }

    .layout {
      display: grid;
      grid-template-columns: 1.4fr 0.7fr;
      gap: 18px;
    }

    /* VIEWER */
    .viewer {
      position: relative;
      min-height: 70vh;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 28px;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      overflow: hidden;
      padding: 18px;
    }

    .viewer img {
      max-width: 100%;
      max-height: 78vh;
      border-radius: 16px;
      object-fit: contain;
    }

    /* SIDE PANEL */
    .side {
      border-radius: 28px;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      text-align: center;
    }

    .logo-wrap img {
      width: 260px;
      max-width: 100%;
    }

    .subtitle {
      margin-top: 14px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--muted);
      font-size: 16px;
    }

    /* BUTTONS */
    .nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 48px;
      height: 48px;
      background: rgba(0,0,0,0.4);
      color: #fff;
      border: none;
      border-radius: 50%;
      font-size: 20px;
      cursor: pointer;
    }

    .prev { left: 14px; }
    .next { right: 14px; }

    .download {
      position: absolute;
      top: 14px;
      right: 14px;
      height: 38px;
      padding: 0 14px;
      border-radius: 999px;
      background: rgba(0,0,0,0.5);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.2);
      font-size: 14px;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .viewer:hover .download {
      display: flex;
    }

    /* MOBILE */
    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .viewer {
        min-height: 55vh;
      }
    }

  </style>
</head>

<body>

<nav class="site-nav">
  <a href="https://teasdale-brown.com/">Home</a>
  <a href="https://ironwoodco.teasdale-brown.com/">Iron Wood Co.</a>
  <a href="https://publicphotos.teasdale-brown.com/" class="active">Public Photos</a>
</nav>

<main class="page">
  <section class="layout">

    <section class="viewer" id="viewer">
      <div id="status">Loading gallery…</div>
      <button class="download" id="downloadBtn">Download</button>
      <button class="nav prev" id="prev">←</button>
      <img id="photo">
      <button class="nav next" id="next">→</button>
    </section>

    <aside class="side">
      <div class="logo-wrap">
        <img src="logo.png">
      </div>
      <p class="subtitle">A changing selection of shared photos.</p>
    </aside>

  </section>
</main>

<script>
const GITHUB_USER = "jamestb112233-stack";
const REPO_NAME = "publicphotos";
const IMAGES_PATH = "images";

const apiUrl = `https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/${IMAGES_PATH}`;

let images = [];
let current = 0;

const photoEl = document.getElementById("photo");
const statusEl = document.getElementById("status");

function showImage(i){
  current = (i + images.length) % images.length;
  const img = images[current];

  photoEl.src = img.download_url;
  photoEl.style.display = "block";
  statusEl.style.display = "none";

  document.getElementById("downloadBtn").onclick = async () => {
    const res = await fetch(img.download_url);
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = img.name;
    a.click();

    URL.revokeObjectURL(url);
  };
}

document.getElementById("next").onclick = () => showImage(current + 1);
document.getElementById("prev").onclick = () => showImage(current - 1);

fetch(apiUrl)
  .then(r => r.json())
  .then(data => {
    images = data.filter(f => /\.(jpg|jpeg|png|webp)$/i.test(f.name));
    showImage(0);
    setInterval(()=>showImage(current+1),6000);
  });
</script>

</body>
</html>
