<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>James's Gallery</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: linear-gradient(180deg, #0f1720 0%, #1a2430 100%);
  color: #e8e8e8;
}

/* HEADER */
.header {
  text-align: center;
  padding: 50px 20px 30px;
}

.header h1 {
  margin: 0;
  font-size: 42px;
  font-weight: 500;
  letter-spacing: 0.5px;
}

.header p {
  margin-top: 10px;
  color: #b8b8b8;
  font-size: 16px;
}

/* CAROUSEL */
.carousel {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 20px 40px;
}

.image-container {
  position: relative;
  border-radius: 18px;
  overflow: hidden;
  background: #111;
  box-shadow: 0 20px 50px rgba(0,0,0,0.4);
}

.image-container img {
  width: 100%;
  height: auto;
  display: block;
}

/* CONTROLS */
.controls {
  position: absolute;
  top: 50%;
  width: 100%;
  display: flex;
  justify-content: space-between;
  transform: translateY(-50%);
}

.btn {
  background: rgba(0,0,0,0.4);
  border: none;
  color: white;
  font-size: 22px;
  width: 48px;
  height: 48px;
  cursor: pointer;
  backdrop-filter: blur(6px);
  transition: background 0.2s;
}

.btn:hover {
  background: rgba(0,0,0,0.6);
}

/* CATEGORY STRIP */
.categories {
  text-align: center;
  margin-top: 30px;
  font-size: 14px;
  color: #9ca3af;
}

.categories span {
  margin: 0 12px;
  cursor: default;
}

.categories span:hover {
  color: #ffffff;
}
</style>
</head>

<body>

<div class="header">
  <h1>James’s Gallery</h1>
  <p>A changing selection of shared photos</p>
</div>

<div class="carousel">
  <div class="image-container">
    <img id="gallery-image" src="images/photo1.jpg">

    <div class="controls">
      <button class="btn" onclick="prev()">←</button>
      <button class="btn" onclick="next()">→</button>
    </div>
  </div>

  <div class="categories">
    <span>Nature</span>
    <span>Travel</span>
    <span>Home</span>
    <span>Misc</span>
  </div>
</div>

<script>
const images = [
  "images/photo1.jpg",
  "images/photo2.jpg",
  "images/photo3.jpg",
  "images/photo4.jpg"
];

let index = 0;

function showImage() {
  document.getElementById("gallery-image").src = images[index];
}

function next() {
  index = (index + 1) % images.length;
  showImage();
}

function prev() {
  index = (index - 1 + images.length) % images.length;
  showImage();
}

/* autoplay */
setInterval(next, 6000);
</script>

</body>
</html>
